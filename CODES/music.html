<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music for Zoe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fcf9f7;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .content {
            text-align: center;
            color: #6B5649;
            padding: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 500;
            font-style: italic;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .music-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.4);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            box-shadow: 0 15px 35px rgba(107, 86, 73, 0.1);
        }

        .album-cover {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(107, 86, 73, 0.3);
            transition: transform 0.4s ease;
        }

        .album-cover:hover {
            transform: scale(1.03);
        }

        audio {
            width: 280px;
            height: 40px;
            margin-top: 10px;
            filter: sepia(20%) saturate(70%) hue-rotate(330deg); /* Blends the player color slightly */
        }

        .song-credit {
            font-family: 'Playfair Display', serif;
            font-size: 1.4em;
            margin-top: 25px;
            color: #6B5649;
            font-weight: 500;
        }

        .artist-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            opacity: 0.8;
        }

        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            padding: 12px 24px;
            background-color: rgba(107, 86, 73, 0.1);
            color: #6B5649;
            border: 1.5px solid #6B5649;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
            font-weight: 500;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
        }

        .back-button:hover {
            background-color: #6B5649;
            color: white;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-button">← Back</a>

    <div class="content">
        <h1>this song reminds me of you <3</h1>
        
        <div class="music-container">
            <img src="music_cover.jpg" alt="Music Cover" class="album-cover">
            
            <audio controls>
                <source src="music.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>

            <p class="song-credit">Balisong</p>
            <p class="artist-name">Rico Blanco</p>
        </div>
    </div>

</body>
</html>
