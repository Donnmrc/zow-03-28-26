<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captured Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .content {
            text-align: center;
            color: #6B5649;
            width: 100%;
            padding: 60px 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5em;
            margin-bottom: 40px;
            font-weight: 500;
            font-style: italic;
            letter-spacing: 1px;
        }

        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            padding: 12px 24px;
            background-color: rgba(255, 255, 255, 0.4);
            color: #6B5649;
            border: 1.5px solid #6B5649;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            font-weight: 500;
            z-index: 10;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            backdrop-filter: blur(5px);
        }

        .back-button:hover {
            background-color: #6B5649;
            color: white;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .gallery-item {
            background: white;
            padding: 12px; /* Polaroid style padding */
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(107, 86, 73, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-10px) rotate(2deg); /* Added a cute slight tilt */
            box-shadow: 0 15px 35px rgba(107, 86, 73, 0.25);
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            border-radius: 5px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5em; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-button">← Back</a>

    <div class="content">
        <h1>captured memories!</h1>
        
        <div class="gallery">
            <div class="gallery-item"><img src="picture1.jpg" alt="Memory 1"></div>
            <div class="gallery-item"><img src="picture2.jpg" alt="Memory 2"></div>
            <div class="gallery-item"><img src="picture3.jpg" alt="Memory 3"></div>
            <div class="gallery-item"><img src="picture4.jpg" alt="Memory 4"></div>
            <div class="gallery-item"><img src="picture5.jpg" alt="Memory 5"></div>
            <div class="gallery-item"><img src="picture6.jpg" alt="Memory 6"></div>
            <div class="gallery-item"><img src="picture7.jpg" alt="Memory 7"></div>
            <div class="gallery-item"><img src="picture8.jpg" alt="Memory 8"></div>
            <div class="gallery-item"><img src="picture9.jpg" alt="Memory 9"></div>
        </div>
    </div>

</body>
</html>
